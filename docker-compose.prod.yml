# Production override — 기동: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# 개발용 docker-compose.yml을 기반으로 프로덕션 설정을 덮어씁니다.

services:
  db:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  redis:
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  backend:
    restart: always
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${DB_NAME:?DB_NAME is required}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:?DB_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      FILE_UPLOAD_DIR: /data/uploads
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_JPA_SHOW_SQL: "false"
      LOGGING_LEVEL_COM_BLACKBOX: INFO
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY: WARN
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-https://localhost/api/oauth/google/callback}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"

  frontend:
    restart: always
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  nginx:
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads:/data/uploads:ro
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
